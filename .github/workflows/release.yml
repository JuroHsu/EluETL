name: Release

# 打 tag 觸發（例：git tag v0.1.0 && git push --tags）
# 產出三平台安裝包並建立 GitHub Release 草稿：
#   - Windows：NSIS .exe 安裝程式 + .msi
#   - macOS：universal .dmg（Apple Silicon + Intel）
#   - Linux：.AppImage + .deb
# 注意：未簽署版本會觸發 SmartScreen / Gatekeeper 警告；
# 簽署與 notarization 為 Phase 3 待辦（憑證核發後接入 CI secrets）。

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkit2gtk)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Elu ETL ${{ github.ref_name }}"
          releaseBody: "三平台安裝包（未簽署開發版）。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
